<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业管理 - Sigma Education</title>
    <style>
        :root {
            --primary-color: #1890ff;
            --sidebar-bg: #4a3aff;
            --bg-color: #f0f2f5;
            --text-color: #333;
            --text-secondary: #666;
            --border-color: #d9d9d9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 200px;
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-item {
            padding: 15px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
            font-size: 15px;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.2);
            border-left: 4px solid white;
        }

        .sidebar-icon {
            width: 20px;
            height: 20px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-orange {
            background: #ff7a45;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* 主Tab页签 */
        .main-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .main-tab {
            padding: 12px 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .main-tab:hover {
            color: var(--primary-color);
        }

        .main-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* 筛选栏 */
        .filter-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 15px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            min-width: 120px;
        }

        .filter-date {
            padding: 8px 15px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 8px 15px 8px 35px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .filter-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        /* 作业卡片网格 */
        .homework-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .homework-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .homework-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .card-header {
            padding: 20px;
            position: relative;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 0;
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-pending {
            background: #fff7e6;
            color: #faad14;
        }

        .badge-completed {
            background: #f6ffed;
            color: #52c41a;
        }

        .badge-expired {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .card-info {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            padding: 20px;
            background: white;
        }

        .card-info-item {
            display: flex;
            gap: 5px;
        }

        .card-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px;
            background: #fafafa;
            border-radius: 4px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            padding: 0 20px 20px 20px;
            background: white;
        }

        .btn-view {
            flex: 1;
            padding: 8px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-more {
            padding: 8px 15px;
            background: transparent;
            color: #666;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 690px;
            padding: 20px 0;
        }

        .page-btn {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .page-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .page-btn:hover:not(.active) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 背景色变化 - 只应用于标题区域 */
        .card-header.card-bg-purple { background: linear-gradient(135deg, #f5f0ff 0%, #e6d9ff 100%); }
        .card-header.card-bg-blue { background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%); }
        .card-header.card-bg-green { background: linear-gradient(135deg, #f6ffed 0%, #d9f7be 100%); }
        .card-header.card-bg-orange { background: linear-gradient(135deg, #fff7e6 0%, #ffe7ba 100%); }
        .card-header.card-bg-pink { background: linear-gradient(135deg, #fff0f6 0%, #ffd6e7 100%); }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 90%;
            max-height: 90%;
            position: relative;
            overflow: hidden;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-image {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-item">
            <span class="sidebar-icon">📊</span>
            <span>智教中心</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">📚</span>
            <span>智能教学</span>
        </div>
        <div class="sidebar-item active">
            <span class="sidebar-icon">📝</span>
            <span>作业&批改</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">�<</span>
            <span>智能组卷</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">�</span>
            <span>数据分析</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">👥</span>
            <span>学生管理</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">🤖</span>
            <span>AI创作</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">📋</span>
            <span>我的资源</span>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 100 100" fill="#1890ff">
                    <circle cx="50" cy="50" r="45" stroke="#1890ff" stroke-width="5" fill="none"/>
                    <path d="M30 50 L50 70 L80 30" stroke="#1890ff" stroke-width="8" fill="none"/>
                </svg>
                兆涵科技 <span style="font-size: 14px; font-weight: normal; color: #666; margin-left: 5px;">Sigma Education</span>
            </div>
            <div class="header-actions">
                <button class="btn-orange">测试</button>
                <button class="btn-primary">新手教程</button>
                <div style="width: 40px; height: 40px; border-radius: 50%; background: #e6f7ff; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    👤
                </div>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 主Tab页签 -->
            <div class="main-tabs">
                <button class="main-tab active" onclick="switchMainTab(this, 'daily')">日常作业</button>
                <button class="main-tab" onclick="switchMainTab(this, 'holiday')">假期作业</button>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-bar">
                <select class="filter-select">
                    <option>全部</option>
                    <option>语文</option>
                    <option>数学</option>
                    <option>英语</option>
                </select>

                <select class="filter-select">
                    <option>班级</option>
                    <option>三年级3班</option>
                    <option>三年级2班</option>
                    <option>三年级1班</option>
                </select>

                <select class="filter-select">
                    <option>类型</option>
                    <option>线下作业</option>
                    <option>智能作业</option>
                    <option>分层作业</option>
                    <option>精准选题作业</option>
                </select>

                <input type="text" class="filter-date" placeholder="开始日期 至 结束日期">

                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="搜索作业">
                </div>

                <div class="filter-actions">
                    <button class="btn-primary">作业数据分析</button>
                    <button class="btn-primary" onclick="showHomeworkModal()">布置日常作业</button>
                </div>
            </div>

            <!-- 作业卡片网格 -->
            <div class="homework-grid">
                <!-- 作业卡片1 -->
                <div class="homework-card">
                    <div class="card-header card-bg-pink">
                        <div class="card-title">
                            <span style="display: inline-block; background: #ff7a45; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px;">语文</span>
                            12月29日分层作业
                        </div>
                        <button class="btn-more" style="position: absolute; top: 20px; right: 20px;">⋮</button>
                    </div>
                    <div class="card-info">
                        <div class="card-info-item">
                            <span style="color: #999;">章节：</span>
                            <span>统编版</span>
                        </div>
                        <div class="card-info-item">
                            <span style="color: #999;">详情：</span>
                            <span>智能分层作业，判断题4道 连线题4道</span>
                        </div>
                        <div class="card-info-item">
                            <span style="color: #999;">提交人数：</span>
                            <span>1/2人</span>
                            <a href="#" style="color: var(--primary-color); text-decoration: none; margin-left: 10px;" onclick="event.preventDefault(); alert('未提交学生名单');">未提交名单</a>
                        </div>
                        <div class="card-info-item">
                            <span style="color: #999;">截止时间：</span>
                            <span>2025年12月31日 18:30</span>
                        </div>
                        <div class="card-info-item" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
                            <span style="color: #999;">三年级3班</span>
                            <button class="btn-view" style="width: 90px; height: 30px; padding: 0; font-size: 13px; flex: none;" onclick="window.location.href='错题详情.html'">检查作业</button>
                        </div>
                    </div>
                    <div style="position: absolute; top: 80px; right: 20px;">
                        <div style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #52c41a; display: flex; align-items: center; justify-content: center; color: #52c41a; font-weight: bold; font-size: 11px; background: white;">
                            已检查
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination">
                <button class="page-btn">‹</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">4</button>
                <button class="page-btn">5</button>
                <button class="page-btn">6</button>
                <button class="page-btn">›</button>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="homeworkModal" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div style="padding: 20px; text-align: center;">
                <h2 style="margin-bottom: 30px; color: #333;">选择作业类型</h2>
                <div style="display: flex; flex-direction: row; gap: 20px; max-width: 1100px; margin: 0 auto; justify-content: center; flex-wrap: wrap;">
                    <button onclick="window.location.href='index.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #f5f0ff 0%, #e6d9ff 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">线下作业</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">创建线下作业，适用于线下纸质作业场景，学生完成后通过拍照上传。系统自动根据学生拍照上传的答题结果进行自动批改。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">拍照上传自动批改</div>
                    </button>
                    <button onclick="window.location.href='index.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #f6ffed 0%, #d9f7be 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">智能布置作业</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">通过选择当前上课内容，AI自动生成作业内容。适用于随堂布置作业场景，学生完成后系统自动进行批改。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">AI自动生成</div>
                    </button>
                    <button onclick="window.location.href='index.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #fff7e6 0%, #ffe7ba 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">精准选题布置作业</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">系统根据当前上课内容自动筛选题目，教师手动选题，题目更精准。适用于课前预习场景，学生完成后系统自动进行批改。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">手动选题更精准</div>
                    </button>
                    <button onclick="window.location.href='mistake-notebook.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">错题本</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">查看和管理学生的错题，进行针对性练习。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">错题管理</div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 显示弹窗
        function showHomeworkModal() {
            const modal = document.getElementById('homeworkModal');
            modal.classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('homeworkModal').classList.remove('show');
        }

        // 点击遮罩层关闭弹窗
        function closeModalOnOverlay(event) {
            if (event.target.id === 'homeworkModal') {
                closeModal();
            }
        }

        // 主Tab切换
        function switchMainTab(element, tabType) {
            // 更新tab样式
            document.querySelectorAll('.main-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');
            
            console.log('切换到:', tabType === 'daily' ? '日常作业' : '假期作业');
            // TODO: 根据tabType加载对应的作业数据
        }

        // 侧边栏切换
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 分页按钮
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!this.textContent.match(/[‹›]/)) {
                    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
