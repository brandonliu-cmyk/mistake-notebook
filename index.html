<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业管理 - Sigma Education</title>
    <style>
        :root {
            --primary-color: #1890ff;
            --sidebar-bg: #4a3aff;
            --bg-color: #f0f2f5;
            --text-color: #333;
            --text-secondary: #666;
            --border-color: #d9d9d9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 200px;
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-item {
            padding: 15px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
            font-size: 15px;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.2);
            border-left: 4px solid white;
        }

        .sidebar-icon {
            width: 20px;
            height: 20px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-orange {
            background: #ff7a45;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* 主Tab页签 */
        .main-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .main-tab {
            padding: 12px 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .main-tab:hover {
            color: var(--primary-color);
        }

        .main-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* 筛选栏 */
        .filter-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 15px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            min-width: 120px;
        }

        .filter-date {
            padding: 8px 15px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 8px 15px 8px 35px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .filter-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        /* 作业卡片网格 */
        .homework-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .homework-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .homework-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .card-header {
            padding: 20px;
            position: relative;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 0;
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-pending {
            background: #fff7e6;
            color: #faad14;
        }

        .badge-completed {
            background: #f6ffed;
            color: #52c41a;
        }

        .badge-expired {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .badge-generating {
            background: #e6f7ff;
            color: #1890ff;
            animation: pulse-badge 1.5s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .card-info {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            padding: 20px;
            background: white;
        }

        .card-info-item {
            display: flex;
            gap: 5px;
        }

        .card-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px;
            background: #fafafa;
            border-radius: 4px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            padding: 0 20px 20px 20px;
            background: white;
        }

        .btn-view {
            flex: 1;
            padding: 8px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-more {
            padding: 8px 15px;
            background: transparent;
            color: #666;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 690px;
            padding: 20px 0;
        }

        .page-btn {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .page-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .page-btn:hover:not(.active) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 背景色变化 - 只应用于标题区域 */
        .card-header.card-bg-purple { background: linear-gradient(135deg, #f5f0ff 0%, #e6d9ff 100%); }
        .card-header.card-bg-blue { background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%); }
        .card-header.card-bg-green { background: linear-gradient(135deg, #f6ffed 0%, #d9f7be 100%); }
        .card-header.card-bg-orange { background: linear-gradient(135deg, #fff7e6 0%, #ffe7ba 100%); }
        .card-header.card-bg-pink { background: linear-gradient(135deg, #fff0f6 0%, #ffd6e7 100%); }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 90%;
            max-height: 90%;
            position: relative;
            overflow: hidden;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-image {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-item">
            <span class="sidebar-icon">📊</span>
            <span>智教中心</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">📚</span>
            <span>智能教学</span>
        </div>
        <div class="sidebar-item active">
            <span class="sidebar-icon">📝</span>
            <span>作业&批改</span>
        </div>
        <div class="sidebar-item">
            <span class="sidebar-icon">�<</span>

        <div class="sidebar-item">

        <div class="sidebar-item">

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 100 100" fill="#1890ff">
                    <circle cx="50" cy="50" r="45" stroke="#1890ff" stroke-width="5" fill="none"/>
                    <path d="M30 50 L50 70 L80 30" stroke="#1890ff" stroke-width="8" fill="none"/>
                </svg>
                兆涵科技 <span style="font-size: 14px; font-weight: normal; color: #666; margin-left: 5px;">Sigma Education</span>

            <div class="header-actions">

        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 主Tab页签 -->

                <button class="main-tab active" onclick="switchMainTab(this, 'daily')">日常作业</button>
                <button class="main-tab" onclick="switchMainTab(this, 'holiday')">假期作业</button>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-bar">
                <select class="filter-select">
                    <option>全部</option>
                    <option>语文</option>
                    <option>数学</option>
                    <option>英语</option>
                </select>

                <select class="filter-select">
                    <option>班级</option>
                    <option>三年级3班</option>
                    <option>三年级2班</option>
                    <option>三年级1班</option>
                </select>

                <select class="filter-select">
                    <option>类型</option>
                    <option>线下作业</option>
                    <option>智能作业</option>
                    <option>分层作业</option>
                    <option>精准选题作业</option>

                <input type="text" class="filter-date" placeholder="开始日期 至 结束日期">

                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="搜索作业">
                </div>

                <div class="filter-actions">
                    <button class="btn-primary">作业数据分析</button>
                    <button class="btn-primary" onclick="showHomeworkModal()">布置日常作业</button>
                </div>
            </div>

            <!-- 作业卡片网格 -->
            <div class="homework-grid" id="homeworkGrid">
                <!-- 作业卡片将通过JS动态渲染 -->
            </div>

            <!-- 分页 -->
            <div class="pagination">
                <button class="page-btn">‹</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">4</button>
                <button class="page-btn">5</button>
                <button class="page-btn">6</button>
                <button class="page-btn">›</button>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="homeworkModal" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div style="padding: 20px; text-align: center;">
                <h2 style="margin-bottom: 30px; color: #333;">选择作业类型</h2>
                <div style="display: flex; flex-direction: row; gap: 20px; max-width: 1100px; margin: 0 auto; justify-content: center; flex-wrap: wrap;">
                    <button onclick="window.location.href='index.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #f5f0ff 0%, #e6d9ff 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">线下作业</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">创建线下作业，适用于线下纸质作业场景，学生完成后通过拍照上传。系统自动根据学生拍照上传的答题结果进行自动批改。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">拍照上传自动批改</div>
                    </button>
                    <button onclick="window.location.href='index.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #f6ffed 0%, #d9f7be 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">智能布置作业</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">通过选择当前上课内容，AI自动生成作业内容。适用于随堂布置作业场景，学生完成后系统自动进行批改。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">AI自动生成</div>
                    </button>
                    <button onclick="window.location.href='index.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #fff7e6 0%, #ffe7ba 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">精准选题布置作业</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">系统根据当前上课内容自动筛选题目，教师手动选题，题目更精准。适用于课前预习场景，学生完成后系统自动进行批改。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">手动选题更精准</div>
                    </button>
                    <button onclick="window.location.href='mistake-notebook.html'" style="padding: 30px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%); font-size: 16px; cursor: pointer; text-align: left; width: 250px; height: 450px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold; margin-bottom: 15px; font-size: 18px;">错题本</div>
                            <div style="font-size: 14px; color: #666; line-height: 1.6;">查看和管理学生的错题，进行针对性练习。</div>
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: auto;">错题管理</div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 静态作业数据（原有作业）
        const staticHomeworkData = [
            {
                id: 'static_1',
                subject: '语文',
                title: '12月29日分层作业',
                chapter: '统编版',
                detail: '智能分层作业，判断题4道 连线题4道',
                submitted: '1/2人',
                class: '三年级3班',
                deadline: '2025年12月31日 18:30',
                status: 'checked',
                bgColor: 'card-bg-pink'
            }
        ];

        // 渲染作业卡片
        function renderHomeworkCards() {
            const grid = document.getElementById('homeworkGrid');
            let html = '';

            // 从 localStorage 获取动态作业数据
            const dynamicHomeworkList = JSON.parse(localStorage.getItem('homeworkList') || '[]');

            // 合并数据（动态数据在前）
            const allHomework = [...dynamicHomeworkList, ...staticHomeworkData];

            allHomework.forEach((homework, index) => {
                if (homework.status === 'generating') {
                    // 正在生成中的作业卡片
                    html += `
                        <div class="homework-card" data-id="${homework.id}">
                            <div class="card-header ${index % 2 === 0 ? 'card-bg-blue' : 'card-bg-green'}">
                                <div class="card-title">
                                    <span style="display: inline-block; background: #1890ff; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px;">${homework.subject || '语文'}</span>
                                    ${homework.title || '新作业'}
                                </div>
                                <span class="card-badge badge-generating" style="position: absolute; top: 15px; right: 15px;">正在生成中</span>
                            </div>
                            <div class="card-info">
                                <div class="card-info-item">
                                    <span style="color: #999;">章节：</span>
                                    <span>${homework.chapter || '统编版'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">详情：</span>
                                    <span>${homework.type || '智能作业'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">班级：</span>
                                    <span>${homework.class || '初一2班 等'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">截止时间：</span>
                                    <span>${homework.deadline || '待定'}</span>
                                </div>
                                <div class="card-info-item" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
                                    <span style="color: #999;">${homework.class || '初一2班 等'}</span>
                                    <button class="btn-view" style="width: 90px; height: 30px; padding: 0; font-size: 13px; flex: none;" onclick="goToPreview('${homework.id}')">查看进度</button>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (homework.status === 'completed') {
                    // 已完成生成但未发布的作业卡片
                    html += `
                        <div class="homework-card" data-id="${homework.id}">
                            <div class="card-header ${homework.bgColor || (index % 2 === 0 ? 'card-bg-blue' : 'card-bg-orange')}">
                                <div class="card-title">
                                    <span style="display: inline-block; background: #1890ff; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px;">${homework.subject || '语文'}</span>
                                    ${homework.title || '新作业'}
                                </div>
                                <button class="btn-more" style="position: absolute; top: 15px; right: 15px;">⋮</button>
                            </div>
                            <div class="card-info">
                                <div class="card-info-item">
                                    <span style="color: #999;">章节：</span>
                                    <span>${homework.chapter || '统编版'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">详情：</span>
                                    <span>${homework.detail || homework.type || '智能作业'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">题目数量：</span>
                                    <span>${homework.questionCount || '未生成'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">截止时间：</span>
                                    <span>${homework.deadline || '待定'}</span>
                                </div>
                                <div class="card-info-item" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
                                    <span style="color: #999;">${homework.class || '初一2班 等'}</span>
                                    <button class="btn-view" style="width: 90px; height: 30px; padding: 0; font-size: 13px; flex: none;" onclick="goToPreview('${homework.id}')">发布</button>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (homework.status === 'published' || homework.status === 'checked') {
                    // 已发布或已检查的作业卡片
                    html += `
                        <div class="homework-card" data-id="${homework.id}">
                            <div class="card-header ${homework.bgColor || (index % 2 === 0 ? 'card-bg-pink' : 'card-bg-orange')}">
                                <div class="card-title">
                                    <span style="display: inline-block; background: #ff7a45; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px;">${homework.subject || '语文'}</span>
                                    ${homework.title || '新作业'}
                                </div>
                                <button class="btn-more" style="position: absolute; top: 20px; right: 20px;">⋮</button>
                            </div>
                            <div class="card-info">
                                <div class="card-info-item">
                                    <span style="color: #999;">章节：</span>
                                    <span>${homework.chapter || '统编版'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">详情：</span>
                                    <span>${homework.detail || homework.type || '智能作业'}</span>
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">提交人数：</span>
                                    <span>${homework.submitted || '0/0人'}</span>
                                    ${homework.submitted ? '<a href="#" style="color: var(--primary-color); text-decoration: none; margin-left: 10px;" onclick="event.preventDefault(); alert(\'未提交学生名单\');">未提交名单</a>' : ''}
                                </div>
                                <div class="card-info-item">
                                    <span style="color: #999;">截止时间：</span>
                                    <span>${homework.deadline || '待定'}</span>
                                </div>
                                <div class="card-info-item" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
                                    <span style="color: #999;">${homework.class || '初一2班 等'}</span>
                                    <button class="btn-view" style="width: 90px; height: 30px; padding: 0; font-size: 13px; flex: none;" onclick="goToDetail('${homework.id}')">检查作业</button>
                                </div>
                            </div>
                            ${homework.status === 'checked' ? `
                            <div style="position: absolute; top: 80px; right: 20px;">
                                <div style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #52c41a; display: flex; align-items: center; justify-content: center; color: #52c41a; font-weight: bold; font-size: 11px; background: white;">
                                    已检查
                                </div>
                            </div>` : ''}
                        </div>
                    `;
                }
            });

            grid.innerHTML = html;
        }

        // 跳转到预览页面
        function goToPreview(homeworkId) {
            sessionStorage.setItem('source', 'index');
            sessionStorage.setItem('viewingHomeworkId', homeworkId);
            window.location.href = 'preview2.html';
        }

        // 跳转到详情页面
        function goToDetail(homeworkId) {
            sessionStorage.setItem('source', 'index');
            sessionStorage.setItem('viewingHomeworkId', homeworkId);
            window.location.href = '错题详情.html';
        }

        // 定期检查作业状态更新
        function checkHomeworkStatus() {
            let homeworkList = JSON.parse(localStorage.getItem('homeworkList') || '[]');
            let needsUpdate = false;
            
            homeworkList.forEach((homework, index) => {
                if (homework.status === 'generating') {
                    const createdAt = new Date(homework.createdAt);
                    const now = new Date();
                    const elapsedSeconds = (now - createdAt) / 1000;
                    
                    // 如果已经过了2分钟，自动标记为完成或发布
                    if (elapsedSeconds >= 120) {
                        if (homework.autoPublish) {
                            homeworkList[index].status = 'published';
                        } else {
                            homeworkList[index].status = 'completed';
                        }
                        needsUpdate = true;
                    }
                }
            });
            
            if (needsUpdate) {
                localStorage.setItem('homeworkList', JSON.stringify(homeworkList));
            }
            
            renderHomeworkCards();
        }

        // 显示弹窗
        function showHomeworkModal() {
            const modal = document.getElementById('homeworkModal');
            modal.classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('homeworkModal').classList.remove('show');
        }

        // 点击遮罩层关闭弹窗
        function closeModalOnOverlay(event) {
            if (event.target.id === 'homeworkModal') {
                closeModal();
            }
        }

        // 主Tab切换
        function switchMainTab(element, tabType) {
            // 更新tab样式
            document.querySelectorAll('.main-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');
            
            console.log('切换到:', tabType === 'daily' ? '日常作业' : '假期作业');
            // TODO: 根据tabType加载对应的作业数据
        }

        // 侧边栏切换
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 分页按钮
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!this.textContent.match(/[‹›]/)) {
                    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                }
            });
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderHomeworkCards();
            // 每2秒检查一次状态更新
            setInterval(checkHomeworkStatus, 2000);
        });
    </script>
</body>
</html>
